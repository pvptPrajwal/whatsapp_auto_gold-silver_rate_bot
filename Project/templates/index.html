<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullion Web Bot</title>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --accent: #00ffcc;
            --text-main: #e0e0e0;
            --danger: #ff4c4c;
            --success: #00e676;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .card {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .card h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .input-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }
        input {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 6px;
            width: 60%;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-start { background-color: var(--success); color: black; }
        .btn-start:hover { background-color: #00c853; }
        .btn-stop { background-color: var(--danger); color: white; }
        .btn-stop:hover { background-color: #d50000; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Terminal Styling */
        #terminal {
            background-color: #000;
            color: #00ff00;
            font-family: 'Consolas', monospace;
            padding: 15px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💎 Bullion Auto-Pilot</h1>

    <div class="card">
        <h3>⚙️ System Settings</h3>
        <div class="input-group">
            <label>WhatsApp Group ID:</label>
            <input type="text" id="group_id" value="ABCDEFG1234567">
        </div>
        <div class="input-group">
            <label>Silver Margin (₹):</label>
            <input type="number" id="s_margin" value="500">
        </div>
        <div class="input-group">
            <label>Gold Margin (₹):</label>
            <input type="number" id="g_margin" value="1500">
        </div>
    </div>

    <div class="card">
        <h3>⏰ Daily Schedule</h3>
        <div class="input-group">
            <label>Morning Update:</label>
            <input type="time" id="time1" value="12:00">
        </div>
        <div class="input-group">
            <label>Afternoon Update:</label>
            <input type="time" id="time2" value="15:00">
        </div>
        <div class="input-group">
            <label>Evening Update:</label>
            <input type="time" id="time3" value="19:00">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-start" id="startBtn" onclick="startBot()">▶ START BOT</button>
        <button class="btn-stop" id="stopBtn" onclick="stopBot()" disabled>⏹ STOP BOT</button>
    </div>

    <div class="card">
        <h3>🖥️ Live Console Logs</h3>
        <div id="terminal">System Initialized... Waiting for command.</div>
    </div>
</div>

<script>
    let logInterval;

    async function startBot() {
        const payload = {
            group_id: document.getElementById('group_id').value,
            s_margin: document.getElementById('s_margin').value,
            g_margin: document.getElementById('g_margin').value,
            time1: document.getElementById('time1').value,
            time2: document.getElementById('time2').value,
            time3: document.getElementById('time3').value
        };

        const response = await fetch('/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        if(response.ok) {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            logInterval = setInterval(fetchLogs, 1000); // Fetch logs every second
        }
    }

    async function stopBot() {
        await fetch('/stop', { method: 'POST' });
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        clearInterval(logInterval);
        document.getElementById('terminal').innerHTML += "<br>[SYSTEM] Bot Stopped Manually.";
    }

    async function fetchLogs() {
        const response = await fetch('/logs');
        const data = await response.json();
        const term = document.getElementById('terminal');
        term.innerHTML = data.logs.join('<br>');
        term.scrollTop = term.scrollHeight; // Auto-scroll to bottom
        
        // If bot finished automatically, reset buttons
        if(!data.is_running) {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            clearInterval(logInterval);
        }
    }
</script>

</body>
</html>
